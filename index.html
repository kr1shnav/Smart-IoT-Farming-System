<!DOCTYPE html>
<html>
<head>
  <title>Smart Agriculture Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5rem;
      letter-spacing: 1px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px;
      width: 220px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    .title {
      font-size: 1.2rem;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .value {
      font-size: 2.8rem;
      font-weight: bold;
      transition: 0.3s ease;
    }

    /* Color accents */
    .moisture { color: #38bdf8; }
    .temp { color: #f97316; }
    .hum { color: #22c55e; }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>

<h1>🌱 Smart Agriculture Dashboard</h1>

<div class="container">

  <div class="card">
    <div class="title">Soil Moisture</div>
    <div id="moisture" class="value moisture">--</div>
  </div>

  <div class="card">
    <div class="title">Temperature</div>
    <div id="temp" class="value temp">--</div>
  </div>

  <div class="card">
    <div class="title">Humidity</div>
    <div id="hum" class="value hum">--</div>
  </div>

</div>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    databaseURL: "https://soilmoisturedata-44dd2-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function animateValue(id, newValue, suffix="") {
    const el = document.getElementById(id);
    el.style.transform = "scale(1.2)";
    setTimeout(() => {
      el.innerText = newValue + suffix;
      el.style.transform = "scale(1)";
    }, 150);
  }

  db.ref("sensor").on("value", (snapshot) => {
    const data = snapshot.val();

    if (data) {
      animateValue("moisture", data.moisture, "%");
      animateValue("temp", data.temperature, "°C");
      animateValue("hum", data.humidity, "%");
    }
  });
</script>

</body>
</html>
